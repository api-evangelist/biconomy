naftiko: 1.0.0-alpha2
info:
  label: Biconomy Supertransaction API — Execute
  description: 'Biconomy MEE Supertransaction API — Execute. Submits a signed quote for multichain composable
    execution via MEE nodes.'
  tags:
  - Biconomy
  - Account Abstraction
  - MEE
  - Execute
  - ERC-4337
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    BICONOMY_API_KEY: BICONOMY_API_KEY
capability:
  consumes:
  - type: http
    namespace: supertransaction-execute
    baseUri: https://api.biconomy.io
    description: Biconomy MEE Execute endpoint. Submits a signed quote for execution.
    resources:
    - name: v1-execute
      path: /v1/execute
      operations:
      - name: executeQuote
        method: POST
        description: Submit a signed supertransaction quote for execution.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Execute request body (signed quote, payloadSignatures).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BICONOMY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: supertransaction-execute-rest
    port: 8080
    description: REST adapter for Biconomy Supertransaction Execute.
    resources:
    - path: /v1/v1/execute
      name: v1-execute
      description: REST surface for v1-execute.
      operations:
      - method: POST
        name: executeQuote
        description: Submit a signed supertransaction quote for execution.
        call: supertransaction-execute.executeQuote
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: supertransaction-execute-mcp
    port: 9090
    transport: http
    description: MCP adapter for Biconomy Supertransaction Execute.
    tools:
    - name: biconomy-execute-quote
      description: Submit a signed Biconomy MEE supertransaction quote for execution.
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: supertransaction-execute.executeQuote
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
