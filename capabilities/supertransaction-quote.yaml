naftiko: 1.0.0-alpha2
info:
  label: Biconomy Supertransaction API — Quote
  description: 'Biconomy MEE Supertransaction API — Quote. Composes instructions and returns a MEE quote with
    signable payload(s) for the chosen account mode (eoa, smart-account, eoa-7702).'
  tags:
  - Biconomy
  - Account Abstraction
  - MEE
  - Quote
  - ERC-4337
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    BICONOMY_API_KEY: BICONOMY_API_KEY
capability:
  consumes:
  - type: http
    namespace: supertransaction-quote
    baseUri: https://api.biconomy.io
    description: Biconomy MEE Quote endpoint. Compose instructions and retrieve a signable supertransaction quote.
    resources:
    - name: v1-quote
      path: /v1/quote
      operations:
      - name: composeQuote
        method: POST
        description: Compose instructions and generate a MEE quote.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Quote request body (mode, ownerAddress, composeFlows, fundingTokens, feeToken, authorizations).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BICONOMY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: supertransaction-quote-rest
    port: 8080
    description: REST adapter for Biconomy Supertransaction Quote.
    resources:
    - path: /v1/v1/quote
      name: v1-quote
      description: REST surface for v1-quote.
      operations:
      - method: POST
        name: composeQuote
        description: Compose instructions and generate a MEE quote.
        call: supertransaction-quote.composeQuote
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: supertransaction-quote-mcp
    port: 9090
    transport: http
    description: MCP adapter for Biconomy Supertransaction Quote.
    tools:
    - name: biconomy-compose-quote
      description: Compose instructions and generate a Biconomy MEE quote.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: supertransaction-quote.composeQuote
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
